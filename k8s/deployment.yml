apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-library-api
  namespace: book-library
spec:
  replicas: 2
  selector:
    matchLabels:
      app: book-library
  template:
    metadata:
      labels:
        app: book-library
    spec:
      containers:
        - name: book-library
          image: 006508975119.dkr.ecr.eu-north-1.amazonaws.com/book-library-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
